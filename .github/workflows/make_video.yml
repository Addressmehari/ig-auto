name: Daily Video Generation

on:
  schedule:
    - cron: "30 10 * * *" # 04:00 PM IST (1 hour after data update)
  workflow_dispatch: # Allows manual triggering

jobs:
  make-video:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg fonts-open-sans fonts-roboto

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Playwright browsers
        run: |
          playwright install chromium --with-deps

      - name: Run Step 2 Make Video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # You might need to provide the live Vercel URL here if it's different from the default
        run: |
          # Replace --url with your live Vercel website URL
          python step2_make_video.py --url https://followerstown.vercel.app/

      - name: Send Video to Telegram
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python send_telegram_video.py

      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-video
          path: final_video.mp4
